<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>logit — offline</title>
    <style>
      :root { color-scheme: light dark; }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem calc(1.4rem + env(safe-area-inset-right)) calc(2rem + env(safe-area-inset-bottom)) calc(1.4rem + env(safe-area-inset-left));
        background: #000;
        color: #fff;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        letter-spacing: -0.03em;
        text-align: center;
      }
      .stack { display: flex; flex-direction: column; gap: 0.5rem; max-width: 24rem; }
      h1 { margin: 0; font-size: 1.6rem; font-weight: 560; }
      p { margin: 0; font-size: 0.9rem; line-height: 1.5; color: rgba(255, 255, 255, 0.62); }
      button {
        margin-top: 0.9rem;
        align-self: center;
        min-height: 2.6rem;
        padding: 0 1.2rem;
        border-radius: 0.6rem;
        border: 1px solid rgba(255, 255, 255, 0.24);
        background: transparent;
        color: #fff;
        font: inherit;
        font-size: 0.86rem;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="stack">
      <h1>you're offline</h1>
      <p>logit needs a connection to load your workouts. Reconnect and try again.</p>
      <button type="button" onclick="location.reload()">Retry</button>
    </div>
  </body>
</html>
